name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "github/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Verify publish mirror structure
        run: |
          test -f github/index.html
          test -f github/404.html
          test -d github/assets
          test -d github/participant
          test -f github/participant/exercises.html
          test -f github/participant/reflections.html
          test -d github/parent
          test -d github/legal
          test -d github/shared
          test -f github/shared/forms-feedback.html
          test -d github/leader
          test -d github/facilitator
          test -d github/kb
          test -f github/kb/index.html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: github

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
