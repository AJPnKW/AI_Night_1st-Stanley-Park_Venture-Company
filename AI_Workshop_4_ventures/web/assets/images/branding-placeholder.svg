<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Branding placeholder</title>
  <desc id="desc">Abstract placeholder banner using yellow, green, and red stripes for later replacement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4dd"/>
      <stop offset="100%" stop-color="#edf3ea"/>
    </linearGradient>
  </defs>
  <rect width="900" height="520" fill="url(#bg)"/>
  <path d="M0 100 L900 0 L900 150 L0 250 Z" fill="#e0b729" opacity="0.88"/>
  <path d="M0 250 L900 150 L900 290 L0 390 Z" fill="#2f7a4a" opacity="0.88"/>
  <path d="M0 390 L900 290 L900 430 L0 520 Z" fill="#b9453d" opacity="0.88"/>
  <rect x="90" y="100" width="390" height="220" rx="26" fill="white" fill-opacity="0.72"/>
  <text x="125" y="180" font-family="Segoe UI, sans-serif" font-size="46" font-weight="700" fill="#1f2a24">Swap image later</text>
  <text x="125" y="235" font-family="Segoe UI, sans-serif" font-size="26" fill="#445048">This file is a safe placeholder hook for a future scarf,</text>
  <text x="125" y="272" font-family="Segoe UI, sans-serif" font-size="26" fill="#445048">header, or event photo replacement.</text>
</svg>

